name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build does not require these — they're runtime-only.
          # Setting empty values prevents build from accidentally calling external APIs.
          ANTHROPIC_API_KEY: ""
          NEXT_PUBLIC_GA_ID: ""
          NEXT_PUBLIC_ADSENSE_CLIENT: ""
